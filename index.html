<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室 在室状況</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .table-wrapper {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      font-size: 16px;
      word-break: break-word;
    }

    th {
      background: #eaeaea;
      font-weight: bold;
    }

    tr:nth-child(even) td {
      background: #fafafa;
    }

    .reload-text {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-top: 12px;
    }

    .error {
      color: #d00;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>研究室 在室状況</h1>

  <div class="table-wrapper">
    <table id="sheet-table">
      <tbody>
        <tr>
          <td>読み込み中...</td>
        </tr>
      </tbody>
    </table>
    <div id="error-message" class="error"></div>
  </div>

  <div class="reload-text">
    10秒ごとに自動更新
  </div>

  <script>
    const sheetId = "1nlpa8DHiHfUj4vSfsdHsantJTvemdvlZ1U0o35llRP4";
    const range = "A1:D7";

    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&range=${range}`;

    async function loadSheet() {
      const tableBody = document.querySelector("#sheet-table tbody");
      const errorMessage = document.querySelector("#error-message");

      try {
        errorMessage.textContent = "";

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("HTTPエラー: " + response.status);
        }

        const text = await response.text();

        if (!text.includes("google.visualization.Query.setResponse")) {
          throw new Error("スプレッドシートを取得できません。共有設定を確認してください。");
        }

        const jsonText = text.substring(
          text.indexOf("{"),
          text.lastIndexOf("}") + 1
        );

        const data = JSON.parse(jsonText);
        const rows = data.table.rows;

        let html = "";

        rows.forEach((row, rowIndex) => {
          html += "<tr>";

          for (let i = 0; i < 4; i++) {
            const cell = row.c[i];
            const value = cell ? cell.v : "";

            if (rowIndex === 0) {
              html += `<th>${value}</th>`;
            } else {
              html += `<td>${value}</td>`;
            }
          }

          html += "</tr>";
        });

        tableBody.innerHTML = html;

      } catch (error) {
        console.error(error);

        tableBody.innerHTML = `
          <tr>
            <td colspan="4">読み込みに失敗しました</td>
          </tr>
        `;

        errorMessage.textContent = error.message;
      }
    }

    loadSheet();
    setInterval(loadSheet, 10000);
  </script>
</body>
</html>
